<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Vista ejecutiva del flujo del proyecto</title>
  <desc id="desc">Diagrama ejecutivo del flujo del proyecto desde la interfaz Streamlit hasta el resultado final con debate multiagente, datos reales y veredicto consolidado.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf8f2"/>
      <stop offset="100%" stop-color="#edf6f2"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#18253d"/>
      <stop offset="100%" stop-color="#254f45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f1ff"/>
      <stop offset="100%" stop-color="#f5fbff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4e8"/>
      <stop offset="100%" stop-color="#fffaf3"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf8ef"/>
      <stop offset="100%" stop-color="#f8fcf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#7f8c8d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#476375"/>
    </marker>
    <style>
      .h1 { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .sub { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #d6e8e1; }
      .sec { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #17263c; }
      .boxTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #17263c; }
      .txt { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #345062; }
      .mini { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #5b7280; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #21443d; }
      .line { stroke: #476375; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #7c919f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>
  <circle cx="1240" cy="120" r="110" fill="#dbeee5" opacity="0.55"/>
  <circle cx="180" cy="880" r="90" fill="#e7efff" opacity="0.55"/>
  <rect x="42" y="30" width="1316" height="110" rx="28" fill="url(#hero)"/>
  <text x="78" y="79" class="h1">Proyecto: debate macro con seleccion final de cartera</text>
  <text x="78" y="112" class="sub">Interfaz Streamlit, orquestacion en Python, 7 agentes, datos reales, evaluaciones paralelas y ranking consolidado</text>

  <text x="70" y="195" class="sec">Entrada</text>
  <g filter="url(#shadow)">
    <rect x="60" y="220" width="270" height="170" rx="24" fill="#ffffff"/>
  </g>
  <text x="88" y="268" class="boxTitle">1. Usuario</text>
  <text x="88" y="300" class="txt">Configura modelo, host,</text>
  <text x="88" y="326" class="txt">duracion y contexto.</text>
  <text x="88" y="362" class="mini">Acceso por Streamlit</text>

  <text x="392" y="195" class="sec">Orquestacion</text>
  <g filter="url(#shadow)">
    <rect x="380" y="220" width="300" height="170" rx="24" fill="url(#accent)" stroke="#b9cfe4" stroke-width="2"/>
  </g>
  <text x="410" y="268" class="boxTitle">2. Motor principal</text>
  <text x="410" y="300" class="txt">Lanza el pipeline, asigna</text>
  <text x="410" y="326" class="txt">modelos y controla las fases.</text>
  <text x="410" y="362" class="mini">ollama_macro_debate.py</text>

  <text x="742" y="195" class="sec">Datos reales</text>
  <g filter="url(#shadow)">
    <rect x="730" y="190" width="280" height="92" rx="22" fill="#ffffff" stroke="#bed3e7" stroke-width="2"/>
    <rect x="730" y="298" width="280" height="92" rx="22" fill="#ffffff" stroke="#c8dbc9" stroke-width="2"/>
  </g>
  <text x="758" y="228" class="boxTitle">3A. Mercado</text>
  <text x="758" y="255" class="mini">yfinance, tecnico y fundamental</text>
  <text x="758" y="336" class="boxTitle">3B. Gurus 13F</text>
  <text x="758" y="363" class="mini">SEC EDGAR y conviction score</text>

  <text x="1072" y="195" class="sec">LLMs</text>
  <g filter="url(#shadow)">
    <rect x="1060" y="220" width="280" height="170" rx="24" fill="#ffffff"/>
  </g>
  <text x="1088" y="268" class="boxTitle">4. Ollama local</text>
  <text x="1088" y="300" class="txt">Modelos para agentes,</text>
  <text x="1088" y="326" class="txt">moderadores y veredicto.</text>
  <text x="1088" y="362" class="mini">Fallback automatico entre modelos</text>

  <path d="M 330 305 L 380 305" class="line"/>
  <path d="M 680 305 L 730 305" class="line"/>
  <path d="M 1010 305 L 1060 305" class="line"/>

  <text x="70" y="470" class="sec">Nucleo analitico</text>
  <g filter="url(#shadow)">
    <rect x="60" y="500" width="1280" height="170" rx="28" fill="url(#accent2)" stroke="#ebc48b" stroke-width="2"/>
  </g>
  <text x="94" y="546" class="boxTitle">5. Debate multiagente</text>
  <text x="94" y="578" class="txt">7 estilos de inversion debaten con datos reales y generan un transcript comun.</text>
  <text x="94" y="612" class="mini">Buffett, Lynch, Druckenmiller, Dalio, Cathie Wood, Howard Marks y Jim Rogers</text>
  <rect x="94" y="626" width="130" height="28" rx="14" fill="#fff"/>
  <rect x="236" y="626" width="150" height="28" rx="14" fill="#fff"/>
  <rect x="398" y="626" width="160" height="28" rx="14" fill="#fff"/>
  <text x="120" y="645" class="chip">Transcript</text>
  <text x="263" y="645" class="chip">Contexto compartido</text>
  <text x="430" y="645" class="chip">Activos concretos</text>

  <path d="M 870 390 C 870 445, 700 445, 700 500" class="line2"/>
  <path d="M 1190 390 C 1190 445, 1190 445, 1190 500" class="line2"/>
  <path d="M 540 390 C 540 445, 360 445, 360 500" class="line2"/>

  <g filter="url(#shadow)">
    <rect x="130" y="720" width="310" height="130" rx="24" fill="#ffffff"/>
    <rect x="545" y="720" width="310" height="130" rx="24" fill="#ffffff"/>
    <rect x="960" y="720" width="310" height="130" rx="24" fill="#ffffff"/>
  </g>
  <text x="160" y="768" class="boxTitle">6. Consenso macro</text>
  <text x="160" y="798" class="txt">Resumen final en 10 lineas</text>
  <text x="160" y="826" class="mini">Moderador de consenso</text>

  <text x="575" y="768" class="boxTitle">7. Top 20</text>
  <text x="575" y="798" class="txt">Activos priorizados con pesos</text>
  <text x="575" y="826" class="mini">Moderador de cartera</text>

  <text x="990" y="768" class="boxTitle">8. Evaluacion paralela</text>
  <text x="990" y="798" class="txt">Tecnico, Elliott, fundamental,</text>
  <text x="990" y="824" class="txt">riesgo, sentimiento, MACD e institucional</text>

  <path d="M 700 670 C 700 695, 285 695, 285 720" class="line"/>
  <path d="M 700 670 L 700 720" class="line"/>
  <path d="M 700 670 C 700 695, 1115 695, 1115 720" class="line"/>

  <g filter="url(#shadow)">
    <rect x="330" y="884" width="740" height="70" rx="26" fill="url(#accent3)" stroke="#a8c7ae" stroke-width="2"/>
  </g>
  <text x="360" y="927" class="boxTitle">9. Veredicto final y visualizacion</text>
  <text x="675" y="927" class="txt">COMPRAR / VIGILAR / EVITAR + tablas + graficos + historico</text>

  <path d="M 700 850 L 700 884" class="line"/>
  <path d="M 1115 850 C 1115 872, 700 872, 700 884" class="line2"/>
  <path d="M 285 850 C 285 872, 700 872, 700 884" class="line2"/>
</svg>